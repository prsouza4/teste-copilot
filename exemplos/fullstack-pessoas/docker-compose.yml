version: "3.9"

services:
  api-auth:
    build:
      context: .
      dockerfile: src/API.Auth/Dockerfile
    container_name: api-auth
    ports:
      - "5001:5001"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
    networks:
      - fullstack-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5001"]
      interval: 10s
      timeout: 5s
      retries: 5

  api-cadastro:
    build:
      context: .
      dockerfile: src/API.Cadastro/Dockerfile
    container_name: api-cadastro
    ports:
      - "5002:5002"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
    networks:
      - fullstack-net
    depends_on:
      api-auth:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5002"]
      interval: 10s
      timeout: 5s
      retries: 5

  frontend:
    build:
      context: src/frontend
      dockerfile: Dockerfile
    container_name: frontend
    ports:
      - "3000:3000"
    environment:
      - NEXTAUTH_URL=http://localhost:3000
      - NEXTAUTH_SECRET=change-this-secret-in-production-32chars
      - AUTH_DUENDE_ID=nextjs-client
      - AUTH_DUENDE_SECRET=nextjs-secret
      - NEXT_PUBLIC_API_CADASTRO_URL=http://localhost:5002
    networks:
      - fullstack-net
    depends_on:
      api-auth:
        condition: service_healthy
      api-cadastro:
        condition: service_healthy

networks:
  fullstack-net:
    driver: bridge
