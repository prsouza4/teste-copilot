name: Auto-assign Issue ao Copilot Coding Agent

# Quando qualquer colaborador adiciona a label "copilot" a uma issue,
# este workflow a atribui automaticamente ao copilot-swe-agent.

on:
  issues:
    types: [labeled]

permissions:
  issues: write
  pull-requests: write

jobs:
  assign-to-copilot:
    name: Atribuir ao Copilot Agent
    runs-on: ubuntu-latest

    # Só executa quando a label adicionada for "copilot" e não for bot
    if: |
      github.event.label.name == 'copilot' &&
      github.actor != 'github-actions[bot]'

    steps:
      - uses: actions/checkout@v4

      - name: 🎯 Atribuir issue ao Copilot Agent
        env:
          GH_TOKEN: ${{ github.token }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          if gh issue edit "$ISSUE_NUMBER" --add-assignee "copilot-swe-agent" 2>/dev/null; then
            echo "✅ Issue #$ISSUE_NUMBER atribuída ao copilot-swe-agent"
          else
            echo "⚠️ Não foi possível atribuir ao copilot-swe-agent"
          fi

      - name: 🧹 Fechar PR do triage automático (se existir)
        env:
          GH_TOKEN: ${{ github.token }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          TRIAGE_PRS=$(gh pr list \
            --state open \
            --json number,author,headRefName \
            --jq ".[] | select(.author.login == \"github-actions[bot]\" and (.headRefName | startswith(\"feature/${ISSUE_NUMBER}-\"))) | .number")

          if [ -n "$TRIAGE_PRS" ]; then
            for PR_NUM in $TRIAGE_PRS; do
              gh pr close "$PR_NUM" \
                --comment "🤖 Handoff para Copilot Coding Agent — label \`copilot\` adicionado à issue #${ISSUE_NUMBER}. Este PR de triage foi fechado para evitar conflito."
              echo "✅ PR #$PR_NUM do triage fechado"
            done
          else
            echo "ℹ️ Nenhum PR de triage para fechar"
          fi
