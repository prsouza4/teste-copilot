name: AI Implement Issue

# Quando a label "implement" é adicionada a uma issue,
# detecta o agente pelo label da área, carrega o .agent.md como system prompt,
# gera o código via GitHub Models API e abre um PR automaticamente.
#
# Fluxo: criar issue → triage automático → adicionar label "implement" → PR gerado

on:
  issues:
    types: [labeled]
  workflow_dispatch:
    inputs:
      issue_number:
        description: 'Número da issue a implementar (para testes manuais)'
        required: true
        type: string

permissions:
  contents: write
  issues: write
  pull-requests: write
  models: read

jobs:
  implement:
    name: Implement Issue with AI Agent
    runs-on: ubuntu-latest
    timeout-minutes: 30

    if: |
      (github.event_name == 'workflow_dispatch') ||
      (github.event_name == 'issues' && github.event.label.name == 'implement')

    steps:
      - uses: actions/checkout@v4

      # ── 1. Carregar dados da issue e detectar agente ──────────────────────
      - name: 📋 Carregar issue e detectar agente
        id: detect
        env:
          GH_TOKEN: ${{ github.token }}
          ISSUE_NUMBER: ${{ github.event.issue.number || github.event.inputs.issue_number }}
          TITLE=$(gh issue view "$ISSUE_NUMBER" --json title -q '.title')
          BODY=$(gh issue view "$ISSUE_NUMBER"  --json body  -q '.body')

          echo "labels=$LABELS"  >> $GITHUB_OUTPUT
          echo "title=$TITLE"    >> $GITHUB_OUTPUT

          # Detectar agente pelo label
          if echo "$LABELS" | grep -qi "frontend"; then
            AGENT="frontend"
          elif echo "$LABELS" | grep -qi "infra"; then
            AGENT="infra"
          elif echo "$LABELS" | grep -qi "messaging"; then
            AGENT="messaging"
          elif echo "$LABELS" | grep -qi "observability"; then
            AGENT="observability"
          else
            AGENT="backend"
          fi

          echo "agent=$AGENT" >> $GITHUB_OUTPUT
          echo "Agente detectado: $AGENT"

          # Salvar body para usar no próximo step
          echo "$BODY" > issue_body.txt

      # ── 2. Gerar código via GitHub Models API ────────────────────────────
      - name: 🤖 Gerar implementação com agente ${{ steps.detect.outputs.agent }}
        env:
          GH_TOKEN: ${{ github.token }}
          ISSUE_NUMBER: ${{ github.event.inputs.issue_number }}
          ISSUE_TITLE: ${{ steps.detect.outputs.title }}
          AGENT_NAME: ${{ steps.detect.outputs.agent }}
        run: |
          python3 << 'PYEOF'
          import json, urllib.request, urllib.error, os, re, sys

          token        = os.environ["GH_TOKEN"]
          issue_number = os.environ["ISSUE_NUMBER"]
          issue_title  = os.environ.get("ISSUE_TITLE", "")
          agent_name   = os.environ.get("AGENT_NAME", "backend")
          agent_file   = f".github/agents/{agent_name}.agent.md"

          with open("issue_body.txt") as f:
              issue_body = f.read()[:2500]

          try:
              with open(agent_file) as f:
                  raw = f.read()
              agent_prompt = re.sub(r'^---.*?---\s*', '', raw, flags=re.DOTALL)[:3500]
          except FileNotFoundError:
              agent_prompt = f"You are a {agent_name} development specialist."

          file_format_instruction = (
              "\n\n---\n## Output Format\n\n"
              "For EVERY file you generate, use EXACTLY this format:\n\n"
              "### FILE: relative/path/to/file.ext\n"
              "```language\n"
              "file content here\n"
              "```\n\n"
              "Generate ALL necessary files for a complete, working implementation.\n"
              "Include source code, unit tests, and a README if applicable.\n"
          )

          system_prompt = agent_prompt + file_format_instruction

          user_prompt = (
              "Implement the following GitHub issue:\n\n"
              f"**Title:** {issue_title}\n\n"
              f"**Description:**\n{issue_body}\n\n"
              f"Generate all necessary files following {agent_name} agent best practices.\n"
          )

          payload = {
              "model": "gpt-4o",
              "messages": [
                  {"role": "system", "content": system_prompt},
                  {"role": "user",   "content": user_prompt}
              ],
              "max_tokens": 4096,
              "temperature": 0.1
          }

          req = urllib.request.Request(
              "https://models.inference.ai.azure.com/chat/completions",
              data=json.dumps(payload).encode(),
              headers={"Authorization": f"Bearer {token}", "Content-Type": "application/json"}
          )

          print(f"Chamando GitHub Models API com agente: {agent_name}")

          try:
              with urllib.request.urlopen(req, timeout=90) as r:
                  response = json.load(r)
                  content  = response["choices"][0]["message"]["content"]
          except urllib.error.HTTPError as e:
              err = e.read().decode()
              print(f"Erro HTTP {e.code}: {err}", file=sys.stderr)
              sys.exit(1)

          file_pattern = r'### FILE: (.+?)\n```(?:\w+)?\n(.*?)```'
          files = re.findall(file_pattern, content, re.DOTALL)

          if files:
              print(f"Arquivos gerados: {len(files)}")
              for path, _ in files:
                  print(f"  - {path.strip()}")
          else:
              print("Nenhum arquivo estruturado encontrado — salvando como notas")
              files = [("IMPLEMENTATION_NOTES.md", content)]

          with open("generated_files.json", "w") as f:
              json.dump([{"path": p.strip(), "content": c} for p, c in files], f, ensure_ascii=False)

          with open("ai_response.txt", "w") as f:
              f.write(content)

          PYEOF

      # ── 3. Criar branch, commitar arquivos e abrir PR ─────────────────────
      - name: 🌿 Criar branch e commitar arquivos gerados
        env:
          GH_TOKEN: ${{ github.token }}
          ISSUE_NUMBER: ${{ github.event.issue.number || github.event.inputs.issue_number }}
          AGENT_NAME: ${{ steps.detect.outputs.agent }}
          ISSUE_TITLE: ${{ steps.detect.outputs.title }}
          RUN_ID: ${{ github.run_id }}
        run: |
          SLUG=$(echo "$ISSUE_TITLE" | tr '[:upper:]' '[:lower:]' | tr ' /' '--' | sed 's/[^a-z0-9-]//g' | cut -c1-30)
          BRANCH="feature/${ISSUE_NUMBER}-${SLUG}-${RUN_ID}"

          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"

          python3 << 'PYEOF'
          import json, os

          with open("generated_files.json") as f:
              files = json.load(f)

          for file in files:
              path    = file["path"]
              content = file["content"]
              dirpath = os.path.dirname(path)
              if dirpath:
                  os.makedirs(dirpath, exist_ok=True)
              with open(path, "w", encoding="utf-8") as f:
                  f.write(content)
              print(f"Criado: {path}")
          PYEOF

          git add -A
          git status

          git commit -m "feat: implementar issue #${ISSUE_NUMBER} via agente ${AGENT_NAME}

          Implementação gerada automaticamente pelo agente especializado ${AGENT_NAME}
          usando GitHub Models API (gpt-4o) com system prompt do .agent.md.

          Closes #${ISSUE_NUMBER}

          Co-authored-by: Copilot <223556219+Copilot@users.noreply.github.com>"

          git push origin "$BRANCH"
          echo "BRANCH=$BRANCH" >> $GITHUB_ENV

      # ── 4. Abrir Pull Request ─────────────────────────────────────────────
      - name: 🔀 Abrir Pull Request
        env:
          GH_TOKEN: ${{ github.token }}
          ISSUE_NUMBER: ${{ github.event.issue.number || github.event.inputs.issue_number }}
          AGENT_NAME: ${{ steps.detect.outputs.agent }}
          ISSUE_TITLE: ${{ steps.detect.outputs.title }}
        run: |
          gh pr create \
            --title "feat: ${{ steps.detect.outputs.title }}" \
            --body "## 🤖 Implementação gerada pelo agente \`${{ steps.detect.outputs.agent }}\`

          Esta PR foi gerada automaticamente pelo agente especializado **\`${{ steps.detect.outputs.agent }}\`**
          usando o \`.github/agents/${{ steps.detect.outputs.agent }}.agent.md\` como system prompt
          e **GitHub Models API (gpt-4o)** para geração do código.

          **Issue:** #${ISSUE_NUMBER} — ${{ steps.detect.outputs.title }}

          ### ⚠️ Revisão necessária
          - Verifique os arquivos gerados
          - Execute os testes localmente
          - Ajuste conforme necessário antes do merge

          Closes #${ISSUE_NUMBER}

          ---
          *Gerado automaticamente pelo workflow \`AI Implement Issue\`*" \
            --base develop \
            --head "$BRANCH" \
            --label "${{ steps.detect.outputs.agent }}"

      # ── 5. Notificar na issue ─────────────────────────────────────────────
      - name: 💬 Comentar na issue
        env:
          GH_TOKEN: ${{ github.token }}
          ISSUE_NUMBER: ${{ github.event.issue.number || github.event.inputs.issue_number }}
        run: |
          gh issue comment "${ISSUE_NUMBER}" \
            --body "## ✅ Implementação concluída

          O agente **\`${{ steps.detect.outputs.agent }}\`** gerou a implementação e abriu um PR automaticamente.

          Próximos passos:
          1. Revise os arquivos no PR
          2. Execute os testes
          3. Faça ajustes se necessário
          4. Faça o merge quando aprovado

          Os workflows de revisão (Security, QA, Architect) vão rodar automaticamente no PR."
