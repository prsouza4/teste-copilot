name: AI PR Description Generator

# Quando um PR é aberto sem descrição (ou descrição muito curta),
# o agente explainer lê os commits e arquivos alterados e gera
# uma descrição profissional automaticamente.

on:
  pull_request:
    branches: [main, develop]
    types: [opened, reopened]

permissions:
  contents: read
  pull-requests: write

jobs:
  generate-description:
    name: Generate PR Description
    runs-on: ubuntu-latest
    timeout-minutes: 10

    if: |
      github.actor != 'dependabot[bot]' &&
      github.actor != 'github-actions[bot]' &&
      github.actor != 'copilot-swe-agent[bot]'

    steps:
      - uses: actions/checkout@v4

      - name: Setup Copilot CLI
        run: npm install -g @github/copilot-cli@latest

      - name: Verificar se PR tem descrição
        id: check-description
        run: |
          BODY="${{ github.event.pull_request.body }}"
          if [ ${#BODY} -lt 50 ]; then
            echo "needs_description=true" >> $GITHUB_OUTPUT
          else
            echo "needs_description=false" >> $GITHUB_OUTPUT
          fi

      - name: 📝 Gerar descrição — Agente Explainer
        if: steps.check-description.outputs.needs_description == 'true'
        run: |
          copilot --agent explainer --allow-all -p "
            Analise o PR #${{ github.event.pull_request.number }} neste repositório.

            Título do PR: ${{ github.event.pull_request.title }}
            Branch: ${{ github.event.pull_request.head.ref }} → ${{ github.event.pull_request.base.ref }}

            Sua tarefa:
            1. Leia os arquivos alterados no PR via GitHub MCP
            2. Leia os commits do PR
            3. Gere uma descrição profissional e atualize o PR via GitHub MCP
            4. A descrição deve seguir este formato:

            ## 📋 O que este PR faz

            <resumo claro em 2-3 linhas do que foi implementado>

            ## 🔄 Mudanças realizadas

            - <mudança 1>
            - <mudança 2>
            - <mudança 3>

            ## 🧪 Como testar

            \`\`\`bash
            <comandos para testar as mudanças>
            \`\`\`

            ## ✅ Checklist

            - [ ] Testes adicionados/atualizados
            - [ ] Documentação atualizada
            - [ ] Sem breaking changes (ou documentados abaixo)

            ## 🔗 Issues relacionadas

            Closes #<número da issue se identificável pelos commits ou branch>

            ---
            *Descrição gerada automaticamente pelo agente Explainer*
          "
        env:
          GITHUB_TOKEN: ${{ secrets.COPILOT_GITHUB_TOKEN }}

      - name: ✅ PR já tem descrição
        if: steps.check-description.outputs.needs_description == 'false'
        run: echo "PR já possui descrição suficiente. Nenhuma ação necessária."
