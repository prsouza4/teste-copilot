name: AI Issue Pipeline

# Pipeline completo: triagem + geração de código + PR.
# Dispara automaticamente ao abrir uma issue — sem labels intermediários.
# Também pode ser disparado manualmente via workflow_dispatch.

on:
  issues:
    types: [opened, reopened]
  workflow_dispatch:
    inputs:
      issue_number:
        description: 'Número da issue a implementar (para testes manuais)'
        required: true
        type: string

permissions:
  contents: write
  issues: write
  pull-requests: write
  models: read

concurrency:
  group: issue-pipeline-${{ github.event.issue.number || github.event.inputs.issue_number }}
  cancel-in-progress: false

jobs:
  pipeline:
    name: Triage + Implement
    runs-on: ubuntu-latest
    timeout-minutes: 30

    if: |
      github.actor != 'dependabot[bot]' &&
      github.actor != 'github-actions[bot]' &&
      github.actor != 'copilot-swe-agent[bot]'

    steps:
      - uses: actions/checkout@v4

      # ── 0. Carregar dados da issue via gh (confiável para ambos os triggers) ─
      - name: 📋 Carregar dados da issue
        id: issue
        env:
          GH_TOKEN: ${{ github.token }}
          ISSUE_NUMBER: ${{ github.event.issue.number || github.event.inputs.issue_number }}
        run: |
          # Retry até 5x com backoff — GitHub API pode retornar 502 logo após criar a issue
          for i in 1 2 3 4 5; do
            TITLE=$(gh issue view "$ISSUE_NUMBER" --json title -q '.title' 2>/dev/null) && break
            echo "Tentativa $i falhou, aguardando ${i}0s..."
            sleep $((i * 10))
          done

          if [ -z "$TITLE" ]; then
            echo "Erro: nao foi possivel obter dados da issue apos 5 tentativas"
            exit 1
          fi

          BODY=$(gh issue view   "$ISSUE_NUMBER" --json body   -q '.body')
          LABELS=$(gh issue view "$ISSUE_NUMBER" --json labels -q '.labels[].name' | tr '\n' ',')

          echo "title=$TITLE"   >> $GITHUB_OUTPUT
          echo "labels=$LABELS" >> $GITHUB_OUTPUT
          echo "$BODY" > issue_body.txt

          # Detectar agente pelo label
          if echo "$LABELS" | grep -qi "frontend"; then    AGENT="frontend"
          elif echo "$LABELS" | grep -qi "infra"; then     AGENT="infra"
          elif echo "$LABELS" | grep -qi "messaging"; then AGENT="messaging"
          elif echo "$LABELS" | grep -qi "observability"; then AGENT="observability"
          else                                              AGENT="backend"
          fi
          echo "agent=$AGENT" >> $GITHUB_OUTPUT
          echo "Agente detectado: $AGENT"

      # ── 1. Triagem ────────────────────────────────────────────────────────
      - name: 📊 Triagem com GitHub Models API
        env:
          GH_TOKEN: ${{ github.token }}
          ISSUE_TITLE: ${{ steps.issue.outputs.title }}
        run: |
          python3 << 'PYEOF'
          import json, urllib.request, urllib.error, os

          token = os.environ["GH_TOKEN"]
          title = os.environ.get("ISSUE_TITLE", "")
          with open("issue_body.txt") as f:
              body = f.read()[:3000]

          system_prompt = (
            "Voce e um especialista em triagem de issues de software.\n"
            "Analise a issue e responda SOMENTE com o bloco markdown abaixo preenchido.\n\n"
            "## Triagem Automatica\n\n"
            "- **Categoria:** <bug | enhancement | infra | frontend | backend | docs>\n"
            "- **Prioridade:** <P0=critico | P1=alto | P2=medio | P3=baixo>\n"
            "- **Labels sugeridas:** <lista separada por virgulas>\n"
            "- **Resumo:** <2-3 linhas>\n"
            "- **Proximo passo:** <acao recomendada>\n"
          )

          payload = {
              "model": "gpt-4o-mini",
              "messages": [
                  {"role": "system", "content": system_prompt},
                  {"role": "user",   "content": "Titulo: " + title + "\n\nDescricao:\n" + body}
              ],
              "max_completion_tokens": 500
          }

          req = urllib.request.Request(
              "https://models.inference.ai.azure.com/chat/completions",
              data=json.dumps(payload).encode(),
              headers={"Authorization": "Bearer " + token, "Content-Type": "application/json"}
          )
          try:
              with urllib.request.urlopen(req, timeout=30) as r:
                  comment = json.load(r)["choices"][0]["message"]["content"]
          except urllib.error.HTTPError as e:
              comment = "## Triagem Automatica\n\n_Erro HTTP " + str(e.code) + "_"

          with open("triage_comment.txt", "w") as f:
              f.write(comment)
          print(comment)
          PYEOF

      - name: 💬 Postar triagem na issue
        env:
          GH_TOKEN: ${{ github.token }}
          ISSUE_NUMBER: ${{ github.event.issue.number || github.event.inputs.issue_number }}
        run: |
          gh issue comment "$ISSUE_NUMBER" --body-file triage_comment.txt

      # ── 2. Gerar código ───────────────────────────────────────────────────
      - name: 🤖 Gerar implementação — agente ${{ steps.issue.outputs.agent }}
        env:
          GH_TOKEN: ${{ github.token }}
          AGENT_NAME: ${{ steps.issue.outputs.agent }}
          ISSUE_TITLE: ${{ steps.issue.outputs.title }}
        run: |
          python3 << 'PYEOF'
          import json, urllib.request, urllib.error, os, re, sys

          token       = os.environ["GH_TOKEN"]
          agent_name  = os.environ.get("AGENT_NAME", "backend")
          issue_title = os.environ.get("ISSUE_TITLE", "")
          agent_file  = ".github/agents/" + agent_name + ".agent.md"

          with open("issue_body.txt") as f:
              issue_body = f.read()[:2500]

          try:
              with open(agent_file) as f:
                  raw = f.read()
              agent_prompt = re.sub(r'^---.*?---\s*', '', raw, flags=re.DOTALL)[:3500]
          except FileNotFoundError:
              agent_prompt = "You are a " + agent_name + " development specialist."

          user_message = (
              "Implement this GitHub issue by generating ALL necessary code files.\n\n"
              "TITLE: " + issue_title + "\n\n"
              "DESCRIPTION:\n" + issue_body + "\n\n"
              "CRITICAL RULES — you MUST follow these exactly:\n"
              "1. Output ONLY code files. No explanations, no prose, no comments outside files.\n"
              "2. Every single file MUST use this exact format (no exceptions):\n\n"
              "### FILE: path/to/file.ext\n"
              "```language\n"
              "(file content here)\n"
              "```\n\n"
              "3. Start your response immediately with the first ### FILE: line.\n"
              "4. Generate all files needed: source code, tests, README.\n"
              "5. Use real, complete, production-ready code — not placeholders.\n"
              "6. If generating .NET/C# code, you MUST include:\n"
              "   - A .csproj file for each project (with correct SDK and PackageReferences)\n"
              "   - A .sln file at the root\n"
              "   - Use .NET 8 unless otherwise specified\n\n"
              "Begin now with ### FILE:"
          )

          payload = {
              "model": "gpt-4o",
              "messages": [
                  {"role": "system", "content": agent_prompt},
                  {"role": "user",   "content": user_message}
              ],
              "max_tokens": 4096,
              "temperature": 0.1
          }

          req = urllib.request.Request(
              "https://models.inference.ai.azure.com/chat/completions",
              data=json.dumps(payload).encode(),
              headers={"Authorization": "Bearer " + token, "Content-Type": "application/json"}
          )

          print("Chamando GitHub Models API com agente: " + agent_name)
          try:
              with urllib.request.urlopen(req, timeout=90) as r:
                  content = json.load(r)["choices"][0]["message"]["content"]
          except urllib.error.HTTPError as e:
              err = e.read().decode()
              print("Erro HTTP " + str(e.code) + ": " + err, file=sys.stderr)
              sys.exit(1)

          print("=== RESPOSTA DO MODELO (primeiros 800 chars) ===")
          print(content[:800])
          print("================================================")

          # Regex flexivel: aceita ### FILE: ou ## FILE: e qualquer linguagem
          files = re.findall(r'#{2,3} FILE: (.+?)\r?\n```[\w]*\r?\n(.*?)```', content, re.DOTALL)
          if not files:
              files = [("IMPLEMENTATION_NOTES.md", content)]
              print("AVISO: modelo nao usou o formato ### FILE: — salvando resposta bruta")
          else:
              print("Arquivos gerados: " + str(len(files)))
              for p, _ in files:
                  print("  - " + p.strip())

          with open("generated_files.json", "w") as f:
              json.dump([{"path": p.strip(), "content": c} for p, c in files], f, ensure_ascii=False)

          with open("ai_response.txt", "w") as f:
              f.write(content)
          PYEOF

      # ── 3. Criar branch, commitar e abrir PR ─────────────────────────────
      - name: 🌿 Criar branch e commitar arquivos gerados
        env:
          GH_TOKEN: ${{ github.token }}
          ISSUE_NUMBER: ${{ github.event.issue.number || github.event.inputs.issue_number }}
          AGENT_NAME: ${{ steps.issue.outputs.agent }}
          ISSUE_TITLE: ${{ steps.issue.outputs.title }}
          RUN_ID: ${{ github.run_id }}
        run: |
          SLUG=$(echo "$ISSUE_TITLE" | tr '[:upper:]' '[:lower:]' | tr ' /' '--' | sed 's/[^a-z0-9-]//g' | cut -c1-30)
          BRANCH="feature/${ISSUE_NUMBER}-${SLUG}-${RUN_ID}"

          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"

          python3 << 'PYEOF'
          import json, os
          with open("generated_files.json") as f:
              files = json.load(f)
          for file in files:
              dirpath = os.path.dirname(file["path"])
              if dirpath:
                  os.makedirs(dirpath, exist_ok=True)
              with open(file["path"], "w", encoding="utf-8") as f:
                  f.write(file["content"])
              print("Criado: " + file["path"])
          PYEOF

          git add -A
          git status
          git commit -m "feat: implementar issue #${ISSUE_NUMBER} via agente ${AGENT_NAME}

          Implementacao gerada automaticamente pelo agente ${AGENT_NAME}
          usando GitHub Models API (gpt-4o).

          Closes #${ISSUE_NUMBER}

          Co-authored-by: Copilot <223556219+Copilot@users.noreply.github.com>"

          git push origin "$BRANCH"
          echo "BRANCH=$BRANCH" >> $GITHUB_ENV

      # ── 4. Build + Test ───────────────────────────────────────────────────
      - name: 🔨 Build e testes
        id: build
        continue-on-error: true
        run: |
          BUILD_STATUS="skipped"
          TEST_STATUS="skipped"
          BUILD_LOG=""
          TEST_LOG=""

          # .NET — detecta .csproj/.sln OU arquivos .cs
          CSPROJ=$(find . -name "*.sln" ! -path "./_build_tmp/*" | head -1)
          [ -z "$CSPROJ" ] && CSPROJ=$(find . -name "*.csproj" ! -path "./_build_tmp/*" | head -1)

          if [ -n "$CSPROJ" ]; then
            echo "Stack detectada: .NET — $CSPROJ"
            dotnet restore "$CSPROJ"
            BUILD_LOG=$(dotnet build "$CSPROJ" --no-restore --no-incremental 2>&1) && BUILD_STATUS="passed" || BUILD_STATUS="failed"
            echo "$BUILD_LOG"
            if [ "$BUILD_STATUS" = "passed" ]; then
              TEST_LOG=$(dotnet test "$CSPROJ" --no-build --logger "console;verbosity=normal" 2>&1) && TEST_STATUS="passed" || TEST_STATUS="failed"
              echo "$TEST_LOG"
            fi

          elif find . -name "*.cs" ! -path "./_build_tmp/*" | grep -q .; then
            echo "Stack detectada: .NET (arquivos .cs sem .csproj — criando projeto minimo)"
            mkdir -p _build_tmp
            dotnet new classlib -n GeneratedCode -o _build_tmp/GeneratedCode --no-restore -f net8.0 2>/dev/null
            find . -name "*.cs" ! -path "./_build_tmp/*" -exec cp {} _build_tmp/GeneratedCode/ \;
            rm -f _build_tmp/GeneratedCode/Class1.cs
            BUILD_LOG=$(dotnet build _build_tmp/GeneratedCode --no-restore 2>&1) && BUILD_STATUS="passed" || BUILD_STATUS="failed"
            echo "$BUILD_LOG"
            TEST_STATUS="skipped"

          # Node / frontend
          elif [ -f "package.json" ]; then
            echo "Stack detectada: Node.js"
            BUILD_LOG=$(npm ci && npm run build 2>&1) && BUILD_STATUS="passed" || BUILD_STATUS="failed"
            echo "$BUILD_LOG"
            if [ "$BUILD_STATUS" = "passed" ] && grep -q '"test"' package.json; then
              TEST_LOG=$(npm test -- --passWithNoTests 2>&1) && TEST_STATUS="passed" || TEST_STATUS="failed"
              echo "$TEST_LOG"
            fi

          # Python
          elif find . -name "requirements*.txt" | grep -q .; then
            echo "Stack detectada: Python"
            pip install -r requirements.txt -q
            BUILD_STATUS="passed"
            if find . -name "test_*.py" -o -name "*_test.py" | grep -q .; then
              TEST_LOG=$(python -m pytest --tb=short 2>&1) && TEST_STATUS="passed" || TEST_STATUS="failed"
              echo "$TEST_LOG"
            fi

          else
            echo "Nenhum stack de build detectado — pulando"
          fi

          # Salvar resultado para usar no PR
          echo "build_status=$BUILD_STATUS" >> $GITHUB_OUTPUT
          echo "test_status=$TEST_STATUS"   >> $GITHUB_OUTPUT

          # Salvar logs resumidos (max 3000 chars)
          echo "$BUILD_LOG" | tail -c 3000 > build_log.txt
          echo "$TEST_LOG"  | tail -c 3000 > test_log.txt

          # Falhar o step se build ou test falharam
          if [ "$BUILD_STATUS" = "failed" ] || [ "$TEST_STATUS" = "failed" ]; then
            exit 1
          fi

      # ── 5. Abrir Pull Request ─────────────────────────────────────────────
      - name: 🔀 Abrir Pull Request
        env:
          GH_TOKEN: ${{ github.token }}
          ISSUE_NUMBER: ${{ github.event.issue.number || github.event.inputs.issue_number }}
          AGENT_NAME: ${{ steps.issue.outputs.agent }}
          ISSUE_TITLE: ${{ steps.issue.outputs.title }}
          BUILD_STATUS: ${{ steps.build.outputs.build_status }}
          TEST_STATUS: ${{ steps.build.outputs.test_status }}
        run: |
          BUILD_BADGE="⚠️ não executado"
          TEST_BADGE="⚠️ não executado"
          [ "$BUILD_STATUS" = "passed"  ] && BUILD_BADGE="✅ passou"
          [ "$BUILD_STATUS" = "failed"  ] && BUILD_BADGE="❌ falhou"
          [ "$BUILD_STATUS" = "skipped" ] && BUILD_BADGE="⏭️ pulado (stack não detectado)"
          [ "$TEST_STATUS"  = "passed"  ] && TEST_BADGE="✅ passou"
          [ "$TEST_STATUS"  = "failed"  ] && TEST_BADGE="❌ falhou"
          [ "$TEST_STATUS"  = "skipped" ] && TEST_BADGE="⏭️ pulado"

          BUILD_LOG=$(cat build_log.txt 2>/dev/null || echo "")
          TEST_LOG=$(cat test_log.txt   2>/dev/null || echo "")
          BUILD_SECTION=""
          TEST_SECTION=""
          [ -n "$BUILD_LOG" ] && BUILD_SECTION="
          <details><summary>Log do build</summary>

          \`\`\`
          $BUILD_LOG
          \`\`\`
          </details>"
          [ -n "$TEST_LOG" ] && TEST_SECTION="
          <details><summary>Log dos testes</summary>

          \`\`\`
          $TEST_LOG
          \`\`\`
          </details>"

          gh pr create \
            --title "feat: ${ISSUE_TITLE}" \
            --body "## Implementacao gerada pelo agente \`${AGENT_NAME}\`

          Agente: **\`${AGENT_NAME}\`** | Issue: #${ISSUE_NUMBER}

          ### Resultado do CI
          | Etapa  | Status |
          |--------|--------|
          | Build  | ${BUILD_BADGE} |
          | Testes | ${TEST_BADGE} |
          ${BUILD_SECTION}${TEST_SECTION}

          ### Revisao necessaria
          - Verifique os arquivos gerados
          - Corrija eventuais erros de build/test antes do merge

          Closes #${ISSUE_NUMBER}

          ---
          _Gerado automaticamente pelo workflow AI Issue Pipeline_" \
            --base develop \
            --head "$BRANCH"

      # ── 6. Notificar na issue ─────────────────────────────────────────────
      - name: 💬 Comentar na issue
        env:
          GH_TOKEN: ${{ github.token }}
          ISSUE_NUMBER: ${{ github.event.issue.number || github.event.inputs.issue_number }}
          AGENT_NAME: ${{ steps.issue.outputs.agent }}
          BUILD_STATUS: ${{ steps.build.outputs.build_status }}
          TEST_STATUS: ${{ steps.build.outputs.test_status }}
        run: |
          BUILD_LINE="- **Build:** ${BUILD_STATUS}"
          TEST_LINE="- **Testes:** ${TEST_STATUS}"
          [ "$BUILD_STATUS" = "passed"  ] && BUILD_LINE="- **Build:** ✅ passou"
          [ "$BUILD_STATUS" = "failed"  ] && BUILD_LINE="- **Build:** ❌ falhou — verifique o PR"
          [ "$BUILD_STATUS" = "skipped" ] && BUILD_LINE="- **Build:** ⏭️ pulado (stack nao detectado)"
          [ "$TEST_STATUS"  = "passed"  ] && TEST_LINE="- **Testes:** ✅ passaram"
          [ "$TEST_STATUS"  = "failed"  ] && TEST_LINE="- **Testes:** ❌ falharam — verifique o PR"
          [ "$TEST_STATUS"  = "skipped" ] && TEST_LINE="- **Testes:** ⏭️ pulados"

          gh issue comment "$ISSUE_NUMBER" \
            --body "## Implementacao concluida

          O agente **\`${AGENT_NAME}\`** gerou a implementacao e abriu um PR.

          ${BUILD_LINE}
          ${TEST_LINE}

          Revise o PR antes de fazer merge."
