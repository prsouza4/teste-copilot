name: AI Issue Pipeline

# Pipeline completo: triagem + geração de código + PR.
# Dispara automaticamente ao abrir uma issue — sem labels intermediários.
# Também pode ser disparado manualmente via workflow_dispatch.

on:
  issues:
    types: [opened, reopened, edited]
  workflow_dispatch:
    inputs:
      issue_number:
        description: 'Número da issue a implementar (para testes manuais)'
        required: true
        type: string

permissions:
  contents: write
  issues: write
  pull-requests: write
  models: read

concurrency:
  group: issue-pipeline-${{ github.event.issue.number || github.event.inputs.issue_number }}
  cancel-in-progress: false

jobs:
  pipeline:
    name: Triage + Implement
    runs-on: ubuntu-latest
    timeout-minutes: 30

    if: |
      github.actor != 'dependabot[bot]' &&
      github.actor != 'github-actions[bot]' &&
      github.actor != 'copilot-swe-agent[bot]'

    steps:
      - uses: actions/checkout@v4

      # ── 0. Carregar dados da issue via gh (confiável para ambos os triggers) ─
      - name: 📋 Carregar dados da issue
        id: issue
        env:
          GH_TOKEN: ${{ github.token }}
          ISSUE_NUMBER: ${{ github.event.issue.number || github.event.inputs.issue_number }}
        run: |
          # Retry até 5x com backoff — GitHub API pode retornar 502 logo após criar a issue
          for i in 1 2 3 4 5; do
            TITLE=$(gh issue view "$ISSUE_NUMBER" --json title -q '.title' 2>/dev/null) && break
            echo "Tentativa $i falhou, aguardando ${i}0s..."
            sleep $((i * 10))
          done

          if [ -z "$TITLE" ]; then
            echo "Erro: nao foi possivel obter dados da issue apos 5 tentativas"
            exit 1
          fi

          BODY=$(gh issue view   "$ISSUE_NUMBER" --json body   -q '.body')
          LABELS=$(gh issue view "$ISSUE_NUMBER" --json labels -q '.labels[].name' | tr '\n' ',')

          echo "title=$TITLE"   >> $GITHUB_OUTPUT
          echo "labels=$LABELS" >> $GITHUB_OUTPUT
          echo "$BODY" > issue_body.txt

          # Detectar agente pelo label
          if echo "$LABELS" | grep -qi "frontend"; then    AGENT="frontend"
          elif echo "$LABELS" | grep -qi "infra"; then     AGENT="infra"
          elif echo "$LABELS" | grep -qi "messaging"; then AGENT="messaging"
          elif echo "$LABELS" | grep -qi "observability"; then AGENT="observability"
          else                                              AGENT="backend"
          fi
          echo "agent=$AGENT" >> $GITHUB_OUTPUT
          echo "Agente detectado: $AGENT"

      # ── 1. Triagem ────────────────────────────────────────────────────────
      - name: 📊 Triagem com GitHub Models API
        env:
          GH_TOKEN: ${{ github.token }}
          ISSUE_TITLE: ${{ steps.issue.outputs.title }}
        run: |
          python3 << 'PYEOF'
          import json, urllib.request, urllib.error, os

          token = os.environ["GH_TOKEN"]
          title = os.environ.get("ISSUE_TITLE", "")
          with open("issue_body.txt") as f:
              body = f.read()[:3000]

          system_prompt = (
            "Voce e um especialista em triagem de issues de software.\n"
            "Analise a issue e responda SOMENTE com o bloco markdown abaixo preenchido.\n\n"
            "## Triagem Automatica\n\n"
            "- **Categoria:** <bug | enhancement | infra | frontend | backend | docs>\n"
            "- **Prioridade:** <P0=critico | P1=alto | P2=medio | P3=baixo>\n"
            "- **Labels sugeridas:** <lista separada por virgulas>\n"
            "- **Resumo:** <2-3 linhas>\n"
            "- **Proximo passo:** <acao recomendada>\n"
          )

          payload = {
              "model": "gpt-4o-mini",
              "messages": [
                  {"role": "system", "content": system_prompt},
                  {"role": "user",   "content": "Titulo: " + title + "\n\nDescricao:\n" + body}
              ],
              "max_completion_tokens": 500
          }

          req = urllib.request.Request(
              "https://models.inference.ai.azure.com/chat/completions",
              data=json.dumps(payload).encode(),
              headers={"Authorization": "Bearer " + token, "Content-Type": "application/json"}
          )
          try:
              with urllib.request.urlopen(req, timeout=30) as r:
                  comment = json.load(r)["choices"][0]["message"]["content"]
          except urllib.error.HTTPError as e:
              comment = "## Triagem Automatica\n\n_Erro HTTP " + str(e.code) + "_"

          with open("triage_comment.txt", "w") as f:
              f.write(comment)
          print(comment)
          PYEOF

      - name: 💬 Postar triagem na issue
        env:
          GH_TOKEN: ${{ github.token }}
          ISSUE_NUMBER: ${{ github.event.issue.number || github.event.inputs.issue_number }}
        run: |
          gh issue comment "$ISSUE_NUMBER" --body-file triage_comment.txt

      # ── 2. Gerar código (apenas em opened/reopened, não em edited) ──────────
      - name: 🤖 Gerar implementação — agente ${{ steps.issue.outputs.agent }}
        if: github.event.action != 'edited'
        env:
          GH_TOKEN: ${{ github.token }}
          AGENT_NAME: ${{ steps.issue.outputs.agent }}
          ISSUE_TITLE: ${{ steps.issue.outputs.title }}
        run: |
          python3 << 'PYEOF'
          import json, urllib.request, urllib.error, os, re, sys

          token       = os.environ["GH_TOKEN"]
          agent_name  = os.environ.get("AGENT_NAME", "backend")
          issue_title = os.environ.get("ISSUE_TITLE", "")
          agent_file  = ".github/agents/" + agent_name + ".agent.md"

          with open("issue_body.txt") as f:
              issue_body = f.read()[:2500]

          try:
              with open(agent_file) as f:
                  raw = f.read()
              agent_prompt = re.sub(r'^---.*?---\s*', '', raw, flags=re.DOTALL)[:3500]
          except FileNotFoundError:
              agent_prompt = "You are a " + agent_name + " development specialist."

          user_message = (
              "Implement this GitHub issue by generating ALL necessary code files.\n\n"
              "TITLE: " + issue_title + "\n\n"
              "DESCRIPTION:\n" + issue_body + "\n\n"
              "CRITICAL RULES — you MUST follow these exactly:\n"
              "1. Output ONLY code files. No explanations, no prose, no comments outside files.\n"
              "2. Every single file MUST use this exact format (no exceptions):\n\n"
              "### FILE: path/to/file.ext\n"
              "```language\n"
              "(file content here)\n"
              "```\n\n"
              "3. Start your response immediately with the first ### FILE: line.\n"
              "4. Generate all files needed: source code, tests, README.\n"
              "5. Use real, complete, production-ready code — not placeholders.\n"
              "6. If generating .NET/C# code, you MUST include:\n"
              "   - A .csproj for EACH project (with correct SDK and PackageReferences)\n"
              "   - A .sln that includes ALL projects — source AND test. No exceptions.\n"
              "   - Use .NET 10 (net10.0). NEVER .NET 8 or .NET 9.\n"
              "   - Test .csproj MUST have <ProjectReference> to every project it uses.\n"
              "   - Every <using> in test code needs a matching <ProjectReference>.\n\n"
              "Begin now with ### FILE:"
          )

          payload = {
              "model": "gpt-4o",
              "messages": [
                  {"role": "system", "content": agent_prompt},
                  {"role": "user",   "content": user_message}
              ],
              "max_tokens": 4096,
              "temperature": 0.1
          }

          req = urllib.request.Request(
              "https://models.inference.ai.azure.com/chat/completions",
              data=json.dumps(payload).encode(),
              headers={"Authorization": "Bearer " + token, "Content-Type": "application/json"}
          )

          print("Chamando GitHub Models API com agente: " + agent_name)
          try:
              with urllib.request.urlopen(req, timeout=90) as r:
                  content = json.load(r)["choices"][0]["message"]["content"]
          except urllib.error.HTTPError as e:
              err = e.read().decode()
              print("Erro HTTP " + str(e.code) + ": " + err, file=sys.stderr)
              sys.exit(1)

          print("=== RESPOSTA DO MODELO (primeiros 800 chars) ===")
          print(content[:800])
          print("================================================")

          # Regex flexivel: aceita ### FILE: ou ## FILE: e qualquer linguagem
          files = re.findall(r'#{2,3} FILE: (.+?)\r?\n```[\w]*\r?\n(.*?)```', content, re.DOTALL)
          if not files:
              files = [("IMPLEMENTATION_NOTES.md", content)]
              print("AVISO: modelo nao usou o formato ### FILE: — salvando resposta bruta")
          else:
              print("Arquivos gerados: " + str(len(files)))
              for p, _ in files:
                  print("  - " + p.strip())

          with open("generated_files.json", "w") as f:
              json.dump([{"path": p.strip(), "content": c} for p, c in files], f, ensure_ascii=False)

          with open("ai_response.txt", "w") as f:
              f.write(content)
          PYEOF

      # ── 3. Criar branch, commitar e abrir PR (apenas em opened/reopened) ───
      - name: 🌿 Criar branch e commitar arquivos gerados
        if: github.event.action != 'edited'
        env:
          GH_TOKEN: ${{ github.token }}
          ISSUE_NUMBER: ${{ github.event.issue.number || github.event.inputs.issue_number }}
          AGENT_NAME: ${{ steps.issue.outputs.agent }}
          ISSUE_TITLE: ${{ steps.issue.outputs.title }}
          RUN_ID: ${{ github.run_id }}
        run: |
          SLUG=$(echo "$ISSUE_TITLE" | tr '[:upper:]' '[:lower:]' | tr ' /' '--' | sed 's/[^a-z0-9-]//g' | cut -c1-30)
          BRANCH="feature/${ISSUE_NUMBER}-${SLUG}-${RUN_ID}"

          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"

          python3 << 'PYEOF'
          import json, os
          with open("generated_files.json") as f:
              files = json.load(f)
          for file in files:
              dirpath = os.path.dirname(file["path"])
              if dirpath:
                  os.makedirs(dirpath, exist_ok=True)
              with open(file["path"], "w", encoding="utf-8") as f:
                  f.write(file["content"])
              print("Criado: " + file["path"])
          PYEOF

          git add -A
          git status
          git commit -m "feat: implementar issue #${ISSUE_NUMBER} via agente ${AGENT_NAME}

          Implementacao gerada automaticamente pelo agente ${AGENT_NAME}
          usando GitHub Models API (gpt-4o).

          Closes #${ISSUE_NUMBER}

          Co-authored-by: Copilot <223556219+Copilot@users.noreply.github.com>"

          git push origin "$BRANCH"
          echo "BRANCH=$BRANCH" >> $GITHUB_ENV

      # ── 4. Setup .NET + Build + Test (apenas em opened/reopened) ────────────
      - name: ⚙️ Setup .NET 10
        if: github.event.action != 'edited'
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: 🔨 Build e testes
        if: github.event.action != 'edited'
        id: build
        continue-on-error: true
        run: |
          SLN=$(find . -name "*.sln" ! -path "./_build_tmp/*" | head -1)
          [ -z "$SLN" ] && SLN=$(find . -name "*.csproj" ! -path "./_build_tmp/*" | head -1)

          if [ -z "$SLN" ]; then
            echo "build_status=skipped" >> $GITHUB_OUTPUT
            echo "test_status=skipped"  >> $GITHUB_OUTPUT
            exit 0
          fi

          echo "Solucao encontrada: $SLN"

          dotnet restore "$SLN"
          dotnet build   "$SLN" --no-restore && \
            echo "build_status=passed" >> $GITHUB_OUTPUT || \
            { echo "build_status=failed" >> $GITHUB_OUTPUT; exit 1; }

          dotnet test "$SLN" --no-build --verbosity normal && \
            echo "test_status=passed" >> $GITHUB_OUTPUT || \
            echo "test_status=failed" >> $GITHUB_OUTPUT

          grep -q "test_status=failed" $GITHUB_OUTPUT && exit 1 || exit 0


      # ── 4.5. Auto-corrigir erros de build (self-healing) ──────────────────
      - name: 🔧 Auto-corrigir erros de build
        id: selfheal
        if: github.event.action != 'edited' && steps.build.outcome == 'failure'
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Re-encontrar csproj neste step (mais confiavel que depender do output anterior)
          CSPROJ=$(find . -name "*.sln" ! -path "./_build_tmp/*" | head -1)
          [ -z "$CSPROJ" ] && CSPROJ=$(find . -name "*.csproj" ! -path "./_build_tmp/*" | head -1)

          if [ -z "$CSPROJ" ]; then
            echo "Sem projeto .NET para auto-corrigir — pulando"
            echo "healed=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          echo "Projeto encontrado: $CSPROJ"
          export CSPROJ_PATH="$CSPROJ"
          python3 << 'PYEOF'
          import json, urllib.request, urllib.error, os, re, subprocess, glob as globmod

          token  = os.environ["GH_TOKEN"]
          csproj = os.environ.get("CSPROJ_PATH", "")

          if not csproj:
              print("Sem projeto .NET — abortando self-healing")
              exit(1)

          MAX_ATTEMPTS = 3
          healed = False
          last_errors = ""

          for attempt in range(1, MAX_ATTEMPTS + 1):
              print("=== Auto-correcao tentativa " + str(attempt) + "/" + str(MAX_ATTEMPTS) + " ===")

              restore = subprocess.run(["dotnet", "restore", csproj], capture_output=True, text=True)
              if restore.returncode != 0:
                  print("Restore falhou:\n" + restore.stdout + restore.stderr)

              result = subprocess.run(
                  ["dotnet", "build", csproj, "--no-restore", "--no-incremental"],
                  capture_output=True, text=True
              )

              if result.returncode == 0:
                  print("Build corrigido na tentativa " + str(attempt) + "!")
                  healed = True
                  break

              errors = (result.stdout + result.stderr)[:4000]
              print("Erros:\n" + errors[:500])

              # Detectar se o erro e identico ao anterior — problema estrutural
              if errors == last_errors and attempt > 1:
                  print("AVISO: mesmo erro da tentativa anterior. Aumentando contexto...")
              last_errors = errors

              # ── Coletar contexto: csproj/sln completos + cs priorizados por erro ──
              skip = lambda f: "_build_tmp" in f or ".git" in f or "\\obj\\" in f or "/obj/" in f

              # Extrair nomes de arquivo mencionados nos erros
              error_files = set(re.findall(r'[\w./\\-]+\.cs', errors))

              context_parts = []
              total_chars = 0
              MAX_CHARS = 12000

              # 1) Todos os .csproj e .sln (contexto critico — project references)
              for pat in ["**/*.csproj", "**/*.sln"]:
                  for f in sorted(globmod.glob(pat, recursive=True)):
                      if skip(f): continue
                      try:
                          content = open(f).read()
                          context_parts.append("### FILE: " + f + "\n" + content)
                          total_chars += len(content)
                      except: pass

              # 2) Arquivos .cs mencionados nos erros (prioridade maxima, conteudo completo)
              for f in sorted(globmod.glob("**/*.cs", recursive=True)):
                  if skip(f): continue
                  fname = os.path.basename(f)
                  if any(fname in ef or ef in f for ef in error_files):
                      try:
                          content = open(f).read()
                          context_parts.append("### FILE: " + f + "\n" + content[:3000])
                          total_chars += min(len(content), 3000)
                      except: pass
                  if total_chars >= MAX_CHARS: break

              # 3) Demais .cs (ate encher o budget)
              for f in sorted(globmod.glob("**/*.cs", recursive=True)):
                  if skip(f): continue
                  if total_chars >= MAX_CHARS: break
                  already = any(f in p for p in context_parts)
                  if already: continue
                  try:
                      content = open(f).read()[:2000]
                      context_parts.append("### FILE: " + f + "\n" + content)
                      total_chars += len(content)
                  except: pass

              files_context = "\n\n".join(context_parts)

              heal_prompt = (
                  "You are fixing .NET compilation errors. Study ALL files carefully before responding.\n\n"
                  "BUILD ERRORS:\n" + errors + "\n\n"
                  "COMPLETE PROJECT STRUCTURE:\n" + files_context + "\n\n"
                  "ANALYSIS INSTRUCTIONS:\n"
                  "- CS0234 (namespace not found): check if the project reference exists in .csproj. "
                  "Add <ProjectReference> or create the missing file.\n"
                  "- CS0246 (type not found): check using statements and namespace declarations.\n"
                  "- NU1102 (package not found): use Version=\"*\" for all NuGet packages.\n\n"
                  "OUTPUT RULES:\n"
                  "1. Output ALL files that need to be created or changed (including NEW files).\n"
                  "2. Use format: ### FILE: path/to/file.ext\n"
                  "```csharp\n(complete file content)\n```\n\n"
                  "3. Fix EVERY error shown. No partial fixes.\n"
                  "4. For missing namespaces: create the missing class files OR fix the .csproj references.\n"
                  "Begin with ### FILE:"
              )

              payload = {
                  "model": "gpt-4o",
                  "messages": [
                      {"role": "system", "content": "You are a senior .NET architect. Fix ALL build errors completely."},
                      {"role": "user",   "content": heal_prompt}
                  ],
                  "max_tokens": 4096,
                  "temperature": 0.1
              }

              req = urllib.request.Request(
                  "https://models.inference.ai.azure.com/chat/completions",
                  data=json.dumps(payload).encode(),
                  headers={"Authorization": "Bearer " + token, "Content-Type": "application/json"}
              )

              try:
                  with urllib.request.urlopen(req, timeout=120) as r:
                      response = json.load(r)["choices"][0]["message"]["content"]
              except urllib.error.HTTPError as e:
                  print("Erro na API: " + str(e.code) + " " + e.read().decode())
                  break

              print("Resposta AI (primeiros 400 chars):\n" + response[:400])

              fixed = re.findall(r"#{2,3} FILE: (.+?)\r?\n```[\w]*\r?\n(.*?)```", response, re.DOTALL)
              if not fixed:
                  print("AI nao retornou arquivos no formato esperado — resposta bruta acima")
                  break

              print("Aplicando " + str(len(fixed)) + " arquivo(s) corrigido(s):")
              for fpath, code in fixed:
                  fpath = fpath.strip()
                  dirpath = os.path.dirname(fpath)
                  if dirpath:
                      os.makedirs(dirpath, exist_ok=True)
                  with open(fpath, "w") as fh:
                      fh.write(code)
                  print("  WROTE: " + fpath)

          with open("selfheal_status.txt", "w") as f:
              f.write("passed" if healed else "failed")

          if not healed:
              print("Auto-correcao falhou apos " + str(MAX_ATTEMPTS) + " tentativas")
              exit(1)
          PYEOF

          if [ "$(cat selfheal_status.txt 2>/dev/null)" = "passed" ]; then
            echo "healed=true" >> $GITHUB_OUTPUT
            git add -A
            git commit -m "fix: auto-correcao de erros de build pelo AI (self-healing)

            Co-authored-by: Copilot <223556219+Copilot@users.noreply.github.com>"
            git push origin "$BRANCH"
          else
            echo "healed=false" >> $GITHUB_OUTPUT
            exit 1
          fi

      # ── 5. Abrir Pull Request (build passou ou foi auto-corrigido) ───────────
      - name: 🔀 Abrir Pull Request
        if: github.event.action != 'edited' && (steps.build.outcome == 'success' || steps.selfheal.outputs.healed == 'true')
        env:
          GH_TOKEN: ${{ github.token }}
          ISSUE_NUMBER: ${{ github.event.issue.number || github.event.inputs.issue_number }}
          AGENT_NAME: ${{ steps.issue.outputs.agent }}
          ISSUE_TITLE: ${{ steps.issue.outputs.title }}
          BUILD_STATUS: ${{ steps.build.outputs.build_status }}
          TEST_STATUS: ${{ steps.build.outputs.test_status }}
        run: |
          BUILD_BADGE="⚠️ não executado"
          TEST_BADGE="⚠️ não executado"
          [ "$BUILD_STATUS" = "passed"  ] && BUILD_BADGE="✅ passou"
          [ "$BUILD_STATUS" = "failed"  ] && BUILD_BADGE="❌ falhou"
          [ "$BUILD_STATUS" = "skipped" ] && BUILD_BADGE="⏭️ pulado (stack nao detectado)"
          [ "${{ steps.selfheal.outputs.healed }}" = "true" ] && BUILD_BADGE="🔧 corrigido automaticamente"
          [ "$TEST_STATUS"  = "passed"  ] && TEST_BADGE="✅ passou"
          [ "$TEST_STATUS"  = "failed"  ] && TEST_BADGE="❌ falhou"
          [ "$TEST_STATUS"  = "skipped" ] && TEST_BADGE="⏭️ pulado"

          BUILD_LOG=$(cat build_log.txt 2>/dev/null || echo "")
          TEST_LOG=$(cat test_log.txt   2>/dev/null || echo "")
          BUILD_SECTION=""
          TEST_SECTION=""
          [ -n "$BUILD_LOG" ] && BUILD_SECTION="
          <details><summary>Log do build</summary>

          \`\`\`
          $BUILD_LOG
          \`\`\`
          </details>"
          [ -n "$TEST_LOG" ] && TEST_SECTION="
          <details><summary>Log dos testes</summary>

          \`\`\`
          $TEST_LOG
          \`\`\`
          </details>"

          gh pr create \
            --title "feat: ${ISSUE_TITLE}" \
            --body "## Implementacao gerada pelo agente \`${AGENT_NAME}\`

          Agente: **\`${AGENT_NAME}\`** | Issue: #${ISSUE_NUMBER}

          ### Resultado do CI
          | Etapa  | Status |
          |--------|--------|
          | Build  | ${BUILD_BADGE} |
          | Testes | ${TEST_BADGE} |
          ${BUILD_SECTION}${TEST_SECTION}

          ### Revisao necessaria
          - Verifique os arquivos gerados
          - Corrija eventuais erros de build/test antes do merge

          Closes #${ISSUE_NUMBER}

          ---
          _Gerado automaticamente pelo workflow AI Issue Pipeline_" \
            --base develop \
            --head "$BRANCH"

      # ── 6. Notificar na issue ─────────────────────────────────────────────
      - name: 💬 Comentar na issue
        if: always() && github.event.action != 'edited'
        env:
          GH_TOKEN: ${{ github.token }}
          ISSUE_NUMBER: ${{ github.event.issue.number || github.event.inputs.issue_number }}
          AGENT_NAME: ${{ steps.issue.outputs.agent }}
          BUILD_STATUS: ${{ steps.build.outputs.build_status }}
          TEST_STATUS: ${{ steps.build.outputs.test_status }}
          BUILD_OUTCOME: ${{ steps.build.outcome }}
        run: |
          BUILD_LINE="- **Build:** ⏭️ pulado (stack nao detectado)"
          TEST_LINE="- **Testes:** ⏭️ pulados"
          [ "$BUILD_STATUS" = "passed"  ] && BUILD_LINE="- **Build:** ✅ passou"
          [ "$BUILD_STATUS" = "failed"  ] && BUILD_LINE="- **Build:** ❌ falhou"
          [ "$TEST_STATUS"  = "passed"  ] && TEST_LINE="- **Testes:** ✅ passaram"
          [ "$TEST_STATUS"  = "failed"  ] && TEST_LINE="- **Testes:** ❌ falharam"

          if [ "$BUILD_OUTCOME" = "failure" ]; then
            BUILD_LOG=$(cat build_log.txt 2>/dev/null | tail -c 2000 || echo "")
            gh issue comment "$ISSUE_NUMBER" \
              --body "## ❌ Build falhou — PR nao foi aberto

          O agente **\`${AGENT_NAME}\`** gerou o codigo mas o build falhou.
          O PR **nao foi criado** ate que o codigo compile.

          ${BUILD_LINE}
          ${TEST_LINE}

          <details><summary>Log do build (ultimas 2000 chars)</summary>

          \`\`\`
          ${BUILD_LOG}
          \`\`\`
          </details>

          Verifique o branch \`${BRANCH}\` e corrija os erros manualmente."
          else
            gh issue comment "$ISSUE_NUMBER" \
              --body "## ✅ Implementacao concluida

          O agente **\`${AGENT_NAME}\`** gerou a implementacao e abriu um PR.

          ${BUILD_LINE}
          ${TEST_LINE}

          Revise o PR antes de fazer merge."
          fi
