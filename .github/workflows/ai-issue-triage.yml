name: AI Issue Triage

# Triagem automática de issues usando GitHub Models API.
# Sem dependências externas — usa Python nativo + gh CLI + GitHub Models API.

on:
  issues:
    types: [opened, reopened]

permissions:
  contents: read
  issues: write
  models: read

concurrency:
  group: issue-triage-${{ github.event.issue.number }}
  cancel-in-progress: false

jobs:
  triage:
    name: AI Issue Triage
    runs-on: ubuntu-latest
    timeout-minutes: 10

    if: |
      github.actor != 'dependabot[bot]' &&
      github.actor != 'github-actions[bot]' &&
      github.actor != 'copilot-swe-agent[bot]'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: 📊 Triagem com GitHub Models API
        env:
          GH_TOKEN: ${{ github.token }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_BODY: ${{ github.event.issue.body }}
        run: |
          python3 << 'PYEOF'
          import json, urllib.request, urllib.error, os, sys

          token   = os.environ["GH_TOKEN"]
          number  = os.environ["ISSUE_NUMBER"]
          title   = os.environ.get("ISSUE_TITLE", "")
          body    = os.environ.get("ISSUE_BODY", "") or ""

          system_prompt = """Você é um especialista em triagem de issues de software.
          Analise a issue fornecida e responda SOMENTE com o bloco markdown abaixo preenchido.
          Não adicione texto fora do bloco.

          ## 🤖 Triagem Automática

          - **Categoria:** <bug | enhancement | infra | frontend | backend | docs>
          - **Prioridade:** <P0=crítico | P1=alto | P2=médio | P3=baixo>
          - **Labels sugeridas:** <lista separada por vírgulas>
          - **Resumo:** <2-3 linhas descrevendo o que foi identificado>
          - **Próximo passo:** <ação recomendada para o time>
          """

          user_prompt = f"Título: {title}\n\nDescrição:\n{body[:3000]}"

          payload = {
              "model": "gpt-4o-mini",
              "messages": [
                  {"role": "system", "content": system_prompt},
                  {"role": "user",   "content": user_prompt}
              ],
              "max_tokens": 600,
              "temperature": 0.2
          }

          req = urllib.request.Request(
              "https://models.inference.ai.azure.com/chat/completions",
              data=json.dumps(payload).encode(),
              headers={
                  "Authorization": f"Bearer {token}",
                  "Content-Type":  "application/json"
              }
          )

          try:
              with urllib.request.urlopen(req, timeout=30) as r:
                  result  = json.load(r)
                  comment = result["choices"][0]["message"]["content"]
          except urllib.error.HTTPError as e:
              error_body = e.read().decode()
              print(f"HTTP Error {e.code}: {error_body}", file=sys.stderr)
              comment = f"## 🤖 Triagem Automática\n\n_Erro ao chamar GitHub Models API: HTTP {e.code}_\n\n```\n{error_body[:500]}\n```"

          with open("triage_comment.txt", "w") as f:
              f.write(comment)

          print(comment)
          PYEOF

      - name: 💬 Postar comentário na issue
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh issue comment "${{ github.event.issue.number }}" \
            --body-file triage_comment.txt

      - name: 🏷️ Adicionar label implement para acionar geração de código
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh issue edit "${{ github.event.issue.number }}" --add-label "implement" \
            && echo "✅ Label 'implement' adicionado — AI Implement Issue vai disparar" \
            || echo "⚠️ Label 'implement' não existe ainda — crie em Settings → Labels"
