name: AI Issue Pipeline

# Pipeline completo: triagem + geração de código + PR.
# Dispara automaticamente ao abrir uma issue — sem labels intermediários.

on:
  issues:
    types: [opened, reopened]

permissions:
  contents: write
  issues: write
  pull-requests: write
  models: read

concurrency:
  group: issue-pipeline-${{ github.event.issue.number }}
  cancel-in-progress: false

jobs:
  pipeline:
    name: Triage + Implement
    runs-on: ubuntu-latest
    timeout-minutes: 30

    if: |
      github.actor != 'dependabot[bot]' &&
      github.actor != 'github-actions[bot]' &&
      github.actor != 'copilot-swe-agent[bot]'

    steps:
      - uses: actions/checkout@v4

      # ── 1. Triagem ────────────────────────────────────────────────────────
      - name: 📊 Triagem com GitHub Models API
        env:
          GH_TOKEN: ${{ github.token }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_BODY: ${{ github.event.issue.body }}
        run: |
          python3 << 'PYEOF'
          import json, urllib.request, urllib.error, os, sys

          token  = os.environ["GH_TOKEN"]
          title  = os.environ.get("ISSUE_TITLE", "")
          body   = os.environ.get("ISSUE_BODY", "") or ""

          system_prompt = (
            "Você é um especialista em triagem de issues de software.\n"
            "Analise a issue e responda SOMENTE com o bloco markdown abaixo preenchido.\n\n"
            "## Triagem Automatica\n\n"
            "- **Categoria:** <bug | enhancement | infra | frontend | backend | docs>\n"
            "- **Prioridade:** <P0=critico | P1=alto | P2=medio | P3=baixo>\n"
            "- **Labels sugeridas:** <lista separada por virgulas>\n"
            "- **Resumo:** <2-3 linhas>\n"
            "- **Proximo passo:** <acao recomendada>\n"
          )

          payload = {
              "model": "gpt-4o-mini",
              "messages": [
                  {"role": "system", "content": system_prompt},
                  {"role": "user",   "content": f"Titulo: {title}\n\nDescricao:\n{body[:3000]}"}
              ],
              "max_tokens": 500,
              "temperature": 0.2
          }

          req = urllib.request.Request(
              "https://models.inference.ai.azure.com/chat/completions",
              data=json.dumps(payload).encode(),
              headers={"Authorization": f"Bearer {os.environ['GH_TOKEN']}", "Content-Type": "application/json"}
          )
          try:
              with urllib.request.urlopen(req, timeout=30) as r:
                  comment = json.load(r)["choices"][0]["message"]["content"]
          except urllib.error.HTTPError as e:
              comment = f"## Triagem Automatica\n\n_Erro HTTP {e.code}_"

          with open("triage_comment.txt", "w") as f:
              f.write(comment)
          print(comment)
          PYEOF

      - name: 💬 Postar triagem na issue
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh issue comment "${{ github.event.issue.number }}" --body-file triage_comment.txt

      # ── 2. Detectar agente pelo label da issue ────────────────────────────
      - name: 🔍 Detectar agente
        id: detect
        env:
          GH_TOKEN: ${{ github.token }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          LABELS=$(gh issue view "$ISSUE_NUMBER" --json labels -q '.labels[].name' | tr '\n' ',')
          TITLE="${{ github.event.issue.title }}"

          if echo "$LABELS" | grep -qi "frontend"; then    AGENT="frontend"
          elif echo "$LABELS" | grep -qi "infra"; then     AGENT="infra"
          elif echo "$LABELS" | grep -qi "messaging"; then AGENT="messaging"
          elif echo "$LABELS" | grep -qi "observability"; then AGENT="observability"
          else                                              AGENT="backend"
          fi

          echo "agent=$AGENT"  >> $GITHUB_OUTPUT
          echo "Agente: $AGENT"

          echo "${{ github.event.issue.body }}" > issue_body.txt

      # ── 3. Gerar código ───────────────────────────────────────────────────
      - name: 🤖 Gerar implementação — agente ${{ steps.detect.outputs.agent }}
        env:
          GH_TOKEN: ${{ github.token }}
          AGENT_NAME: ${{ steps.detect.outputs.agent }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
        run: |
          python3 << 'PYEOF'
          import json, urllib.request, urllib.error, os, re, sys

          token      = os.environ["GH_TOKEN"]
          agent_name = os.environ.get("AGENT_NAME", "backend")
          issue_title = os.environ.get("ISSUE_TITLE", "")
          agent_file  = f".github/agents/{agent_name}.agent.md"

          with open("issue_body.txt") as f:
              issue_body = f.read()[:2500]

          try:
              with open(agent_file) as f:
                  raw = f.read()
              agent_prompt = re.sub(r'^---.*?---\s*', '', raw, flags=re.DOTALL)[:3500]
          except FileNotFoundError:
              agent_prompt = f"You are a {agent_name} development specialist."

          file_format = (
              "\n\n---\n## Output Format\n\n"
              "For EVERY file, use EXACTLY:\n\n"
              "### FILE: relative/path/to/file.ext\n"
              "```language\n"
              "file content\n"
              "```\n\n"
              "Generate ALL files for a complete, working implementation.\n"
          )

          payload = {
              "model": "claude-opus-4.5",
              "messages": [
                  {"role": "system", "content": agent_prompt + file_format},
                  {"role": "user",   "content": (
                      f"Implement this GitHub issue:\n\n"
                      f"**Title:** {issue_title}\n\n"
                      f"**Description:**\n{issue_body}\n\n"
                      f"Generate all files following {agent_name} best practices."
                  )}
              ],
              "max_tokens": 4096,
              "temperature": 0.1
          }

          req = urllib.request.Request(
              "https://models.inference.ai.azure.com/chat/completions",
              data=json.dumps(payload).encode(),
              headers={"Authorization": f"Bearer {token}", "Content-Type": "application/json"}
          )

          print(f"Gerando com agente: {agent_name}")
          try:
              with urllib.request.urlopen(req, timeout=90) as r:
                  content = json.load(r)["choices"][0]["message"]["content"]
          except urllib.error.HTTPError as e:
              print(f"Erro HTTP {e.code}: {e.read().decode()}", file=sys.stderr)
              sys.exit(1)

          files = re.findall(r'### FILE: (.+?)\n```(?:\w+)?\n(.*?)```', content, re.DOTALL)
          if not files:
              files = [("IMPLEMENTATION_NOTES.md", content)]
              print("Sem arquivos estruturados — salvando como notas")
          else:
              print(f"Arquivos gerados: {len(files)}")
              for p, _ in files: print(f"  - {p.strip()}")

          with open("generated_files.json", "w") as f:
              json.dump([{"path": p.strip(), "content": c} for p, c in files], f, ensure_ascii=False)
          PYEOF

      # ── 4. Criar branch + commit + PR ────────────────────────────────────
      - name: 🌿 Criar branch e abrir PR
        env:
          GH_TOKEN: ${{ github.token }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          AGENT_NAME: ${{ steps.detect.outputs.agent }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          RUN_ID: ${{ github.run_id }}
        run: |
          SLUG=$(echo "$ISSUE_TITLE" | tr '[:upper:]' '[:lower:]' | tr ' /' '--' | sed 's/[^a-z0-9-]//g' | cut -c1-30)
          BRANCH="feature/${ISSUE_NUMBER}-${SLUG}-${RUN_ID}"

          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"

          python3 << 'PYEOF'
          import json, os
          with open("generated_files.json") as f:
              files = json.load(f)
          for file in files:
              dirpath = os.path.dirname(file["path"])
              if dirpath:
                  os.makedirs(dirpath, exist_ok=True)
              with open(file["path"], "w", encoding="utf-8") as f:
                  f.write(file["content"])
              print(f"Criado: {file['path']}")
          PYEOF

          git add -A
          git commit -m "feat: implementar issue #${ISSUE_NUMBER} via agente ${AGENT_NAME}

          Closes #${ISSUE_NUMBER}

          Co-authored-by: Copilot <223556219+Copilot@users.noreply.github.com>"

          git push origin "$BRANCH"

          gh pr create \
            --title "feat: ${ISSUE_TITLE}" \
            --body "## Implementacao gerada pelo agente \`${AGENT_NAME}\`

          Agente: **${AGENT_NAME}** | Issue: #${ISSUE_NUMBER}

          Closes #${ISSUE_NUMBER}

          ---
          _Gerado automaticamente por AI Issue Pipeline_" \
            --base develop \
            --head "$BRANCH"

          gh issue comment "${ISSUE_NUMBER}" \
            --body "PR aberto automaticamente pelo agente **${AGENT_NAME}**. Revise antes de fazer merge."
