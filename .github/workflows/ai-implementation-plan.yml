name: AI Implementation Plan

# Quando uma issue recebe a label 'ready-for-dev', a GitHub Models API
# gera um plano de implementação detalhado e posta como comentário.
# Garante alinhamento arquitetural antes de qualquer código ser escrito.

on:
  issues:
    types: [labeled]

permissions:
  contents: read
  issues: write
  models: read

jobs:
  implementation-plan:
    name: Generate Implementation Plan
    runs-on: ubuntu-latest
    timeout-minutes: 15

    if: |
      github.event.label.name == 'ready-for-dev' &&
      github.actor != 'dependabot[bot]' &&
      github.actor != 'github-actions[bot]' &&
      github.actor != 'copilot-swe-agent[bot]'

    steps:
      - uses: actions/checkout@v4

      - name: 🏗️ Gerar plano de implementação com GitHub Models API
        env:
          GH_TOKEN: ${{ github.token }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_BODY: ${{ github.event.issue.body }}
          REPO: ${{ github.repository }}
        run: |
          python3 << 'PYEOF'
          import json, urllib.request, urllib.error, os, sys

          token  = os.environ["GH_TOKEN"]
          number = os.environ["ISSUE_NUMBER"]
          title  = os.environ.get("ISSUE_TITLE", "")
          body   = os.environ.get("ISSUE_BODY", "") or ""
          repo   = os.environ.get("REPO", "")

          system_prompt = """Você é um arquiteto de software e especialista em decomposição de tarefas.
          Analise a issue e gere um plano de implementação completo.
          Responda SOMENTE com o bloco markdown abaixo preenchido — sem texto extra fora do bloco.

          ## 🏗️ Plano de Implementação

          ### Abordagem arquitetural
          **Padrão:** <Clean Architecture | CQRS | CRUD | Event-driven>
          **Justificativa:** <por que este padrão para esta tarefa>

          ### Estrutura de arquivos a criar
          ```
          src/
          └── <descreva a estrutura de pastas e arquivos>
          ```

          ### Tarefas de implementação

          | # | Tarefa | Agente | Tamanho |
          |---|--------|--------|---------|
          | 1 | <tarefa 1> | backend | S/M/L |
          | 2 | <tarefa 2> | backend | S/M/L |

          ### Dependências e integrações
          <lista de serviços, bancos, brokers ou "Nenhuma dependência externa">

          ### Comando para iniciar localmente
          ```powershell
          git checkout develop
          git checkout -b feature/ISSUE_NUMBER-<descricao-curta>
          copilot --agent backend --allow-all -p "Implementar issue #ISSUE_NUMBER: ISSUE_TITLE"
          ```

          ### Riscos e pontos de atenção
          <lista ou "Sem riscos identificados">
          """

          user_prompt = f"Título: {title}\n\nDescrição:\n{body[:3000]}"
          user_prompt = user_prompt.replace("ISSUE_NUMBER", number).replace("ISSUE_TITLE", title)

          payload = {
              "model": "gpt-4o-mini",
              "messages": [
                  {"role": "system", "content": system_prompt.replace("ISSUE_NUMBER", number).replace("ISSUE_TITLE", title)},
                  {"role": "user",   "content": user_prompt}
              ],
              "max_tokens": 1000,
              "temperature": 0.2
          }

          req = urllib.request.Request(
              "https://models.inference.ai.azure.com/chat/completions",
              data=json.dumps(payload).encode(),
              headers={"Authorization": f"Bearer {token}", "Content-Type": "application/json"}
          )

          try:
              with urllib.request.urlopen(req, timeout=45) as r:
                  comment = json.load(r)["choices"][0]["message"]["content"]
          except urllib.error.HTTPError as e:
              comment = f"## 🏗️ Plano de Implementação\n\n_Erro HTTP {e.code}: {e.read().decode()[:300]}_"

          with open("plan_comment.txt", "w") as f:
              f.write(comment)
          print(comment)
          PYEOF

      - name: 💬 Postar plano na issue
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh issue comment "${{ github.event.issue.number }}" --body-file plan_comment.txt
