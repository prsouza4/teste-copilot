name: API Documentation Generator

# Triggered when a PR modifies backend API files (controllers, endpoints, routes)
# Calls the api-docs agent to generate/update Markdown documentation
# Output docs are consumed by the frontend agent as API contract reference

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - "**/Controllers/**/*.cs"
      - "**/Endpoints/**/*.cs"
      - "**/Routers/**/*.cs"
      - "**/*.cs"

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: api-docs-${{ github.event.pull_request.number }}
  cancel-in-progress: true

env:
  GH_TOKEN: ${{ secrets.BOT_PAT }}

jobs:
  detect-api-changes:
    name: Detect API Changes
    runs-on: ubuntu-24.04
    timeout-minutes: 5

    outputs:
      has_api_changes: ${{ steps.detect.outputs.has_api_changes }}
      changed_files: ${{ steps.detect.outputs.changed_files }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect API endpoint changes
        id: detect
        shell: pwsh
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          # Get list of changed .cs files in this PR
          $changedFiles = gh pr diff $env:PR_NUMBER --name-only 2>$null | Where-Object {
            $_ -match '\.(cs)$'
          }

          if (-not $changedFiles) {
            echo "has_api_changes=false" >> $env:GITHUB_OUTPUT
            Write-Host "No .cs files changed"
            exit 0
          }

          # Check if any file contains API endpoint patterns
          $apiPatterns = @(
            '\[HttpGet\]', '\[HttpPost\]', '\[HttpPut\]', '\[HttpDelete\]', '\[HttpPatch\]',
            'MapGet\(', 'MapPost\(', 'MapPut\(', 'MapDelete\(', 'MapPatch\(',
            '\[Route\(', 'ApiController', 'ControllerBase'
          )

          $apiFiles = @()
          foreach ($file in $changedFiles) {
            if (Test-Path $file) {
              $content = Get-Content $file -Raw -ErrorAction SilentlyContinue
              foreach ($pattern in $apiPatterns) {
                if ($content -match $pattern) {
                  $apiFiles += $file
                  break
                }
              }
            }
          }

          if ($apiFiles.Count -eq 0) {
            echo "has_api_changes=false" >> $env:GITHUB_OUTPUT
            Write-Host "No API endpoint changes detected"
          } else {
            echo "has_api_changes=true" >> $env:GITHUB_OUTPUT
            $filesJson = $apiFiles | ConvertTo-Json -Compress
            echo "changed_files=$filesJson" >> $env:GITHUB_OUTPUT
            Write-Host "API changes detected in $($apiFiles.Count) file(s):"
            $apiFiles | ForEach-Object { Write-Host "  - $_" }
          }

  generate-docs:
    name: Generate API Documentation
    needs: detect-api-changes
    if: needs.detect-api-changes.outputs.has_api_changes == 'true'
    runs-on: ubuntu-24.04
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate API Docs (api-docs Agent)
        id: generate
        uses: ./.github/actions/ai-review
        with:
          agent: api-docs
          context-type: pr-diff
          pr-number: ${{ github.event.pull_request.number }}
          prompt-file: .github/prompts/api-docs-generate.md
          timeout-minutes: 10
          bot-pat: ${{ secrets.BOT_PAT }}
          copilot-token: ${{ secrets.COPILOT_GITHUB_TOKEN }}

      - name: Post documentation summary on PR
        if: steps.generate.outputs.findings != ''
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          FINDINGS: ${{ steps.generate.outputs.findings }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          SERVER_URL: ${{ github.server_url }}
          RUN_ID: ${{ github.run_id }}
        run: |
          $comment = @"
          <!-- API-DOCS-GENERATED -->

          ## 📄 Documentação de API Gerada

          > Gerado automaticamente pelo agente **api-docs** após detectar alterações em endpoints.

          $($env:FINDINGS)

          ---

          > **Frontend agent:** consulte os arquivos em `docs/api/` antes de implementar qualquer UI que consuma esses endpoints.

          <sub>[Ver workflow]($($env:SERVER_URL)/$($env:GITHUB_REPOSITORY)/actions/runs/$($env:RUN_ID))</sub>
          "@

          $comment | Set-Content /tmp/api-docs-comment.md -Encoding UTF8

          python3 .github/scripts/post_issue_comment.py `
            --issue $env:PR_NUMBER `
            --body-file "/tmp/api-docs-comment.md" `
            --marker "API-DOCS-GENERATED"
