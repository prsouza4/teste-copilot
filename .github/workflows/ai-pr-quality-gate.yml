name: AI PR Quality Gate

# Revisão automática de PRs usando GitHub Models API.
# Três revisões paralelas (Security, QA, Architect) + consolidação final.

on:
  pull_request:
    branches: [main, develop]
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write
  models: read

concurrency:
  group: ai-quality-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  # ── Execução de Testes (todos os PRs, sem exceção) ────────────────────────
  executar-testes:
    name: Run Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: ⚙️ Configurar .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.x"

      - name: 🔍 Localizar solutions .NET no PR
        id: find-solutions
        run: |
          # Localiza arquivos .sln modificados ou verifica pastas com .sln
          CHANGED=$(git diff --name-only origin/${{ github.base_ref }}...HEAD 2>/dev/null || git diff --name-only HEAD~1 2>/dev/null || echo "")
          # Coleta pastas únicas que contêm .sln
          DIRS=$(find . -name "*.sln" -not -path "*/node_modules/*" -exec dirname {} \; | sort -u)
          echo "solutions_dirs=$DIRS" >> "$GITHUB_OUTPUT"
          echo "Pastas com solutions encontradas:"
          echo "$DIRS"

      - name: 🧪 Executar dotnet test
        id: run-tests
        run: |
          RESULTADO="✅ Todos os testes passaram"
          FALHOU=false

          find . -name "*.sln" -not -path "*/node_modules/*" | while read SLN; do
            PASTA=$(dirname "$SLN")
            echo "▶ Executando testes em: $PASTA"
            if ! dotnet test "$SLN" --configuration Release --no-build 2>/dev/null; then
              # Tenta com build
              if ! dotnet test "$SLN" --configuration Debug --logger "console;verbosity=normal"; then
                echo "❌ Testes falharam em: $SLN"
                echo "TESTES_FALHARAM=true" >> "$GITHUB_ENV"
              fi
            fi
          done

      - name: 📋 Postar resultado dos testes no PR
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ "${TESTES_FALHARAM:-false}" = "true" ]; then
            ICONE="❌"
            STATUS="FALHOU — Corrigir antes do merge"
          else
            ICONE="✅"
            STATUS="PASSOU"
          fi

          COMMENT="${ICONE} **Testes Automatizados: ${STATUS}**

          \`\`\`
          $(find . -name "*.sln" -not -path "*/node_modules/*" | while read SLN; do
            dotnet test "$SLN" --configuration Debug --logger "console;verbosity=minimal" 2>&1 | tail -20 || true
          done)
          \`\`\`"

          echo "$COMMENT" > test_result.txt
          gh pr comment "${{ github.event.pull_request.number }}" --body-file test_result.txt

      - name: ❌ Falhar se testes quebraram
        if: env.TESTES_FALHARAM == 'true'
        run: exit 1

  # ── Revisão de Segurança ──────────────────────────────────────────────────
  security-review:
    name: Security Review
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: |
      github.actor != 'dependabot[bot]' &&
      github.actor != 'copilot-swe-agent[bot]'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🔒 Revisão de Segurança com GitHub Models API
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          DIFF=$(gh pr diff "$PR_NUMBER" | head -c 4000 || echo "Sem diff disponível")

          python3 << 'PYEOF'
          import json, urllib.request, urllib.error, os, sys

          token  = os.environ["GH_TOKEN"]
          number = os.environ["PR_NUMBER"]
          title  = os.environ.get("PR_TITLE", "")
          diff   = os.environ.get("DIFF", "")

          system_prompt = """Você é um especialista em segurança de software (AppSec).
          Analise o diff do PR e identifique vulnerabilidades de segurança.
          Responda SOMENTE com o bloco markdown abaixo preenchido.

          ## 🔒 Revisão de Segurança

          **Veredicto:** PASS | WARN | CRITICAL_FAIL

          ### Vulnerabilidades encontradas
          <lista com severidade: CRITICAL / HIGH / MEDIUM / LOW ou "Nenhuma encontrada">

          ### Recomendações
          <ações corretivas ou "Nenhuma ação necessária">
          """

          user_prompt = f"Título do PR: {title}\n\nDiff (primeiros 4000 chars):\n{diff}"

          payload = {
              "model": "gpt-4o-mini",
              "messages": [
                  {"role": "system", "content": system_prompt},
                  {"role": "user",   "content": user_prompt}
              ],
              "max_tokens": 700,
              "temperature": 0.1
          }

          req = urllib.request.Request(
              "https://models.inference.ai.azure.com/chat/completions",
              data=json.dumps(payload).encode(),
              headers={"Authorization": f"Bearer {token}", "Content-Type": "application/json"}
          )

          try:
              with urllib.request.urlopen(req, timeout=30) as r:
                  comment = json.load(r)["choices"][0]["message"]["content"]
          except urllib.error.HTTPError as e:
              comment = f"## 🔒 Revisão de Segurança\n\n_Erro HTTP {e.code}: {e.read().decode()[:300]}_"

          with open("security_comment.txt", "w") as f:
              f.write(comment)
          print(comment)
          PYEOF

      - name: 💬 Postar comentário de segurança
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh pr comment "${{ github.event.pull_request.number }}" --body-file security_comment.txt

  # ── Revisão de Qualidade ──────────────────────────────────────────────────
  qa-review:
    name: QA Review
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: |
      github.actor != 'dependabot[bot]' &&
      github.actor != 'copilot-swe-agent[bot]'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: ✅ Revisão de Qualidade com GitHub Models API
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          DIFF=$(gh pr diff "$PR_NUMBER" | head -c 4000 || echo "Sem diff disponível")

          python3 << 'PYEOF'
          import json, urllib.request, urllib.error, os, sys

          token  = os.environ["GH_TOKEN"]
          number = os.environ["PR_NUMBER"]
          title  = os.environ.get("PR_TITLE", "")
          diff   = os.environ.get("DIFF", "")

          system_prompt = """Você é um especialista em qualidade de software e testes.
          Analise o diff do PR e avalie cobertura de testes e qualidade do código.
          Responda SOMENTE com o bloco markdown abaixo preenchido.

          ## ✅ Revisão de Qualidade

          **Veredicto:** PASS | WARN | CRITICAL_FAIL

          ### Cobertura de testes
          <avaliação: há testes para o código novo? Casos de borda cobertos?>

          ### Problemas de qualidade
          <lista ou "Nenhum encontrado">

          ### Recomendações
          <ações corretivas ou "Código está bem testado">
          """

          user_prompt = f"Título do PR: {title}\n\nDiff (primeiros 4000 chars):\n{diff}"

          payload = {
              "model": "gpt-4o-mini",
              "messages": [
                  {"role": "system", "content": system_prompt},
                  {"role": "user",   "content": user_prompt}
              ],
              "max_tokens": 700,
              "temperature": 0.1
          }

          req = urllib.request.Request(
              "https://models.inference.ai.azure.com/chat/completions",
              data=json.dumps(payload).encode(),
              headers={"Authorization": f"Bearer {token}", "Content-Type": "application/json"}
          )

          try:
              with urllib.request.urlopen(req, timeout=30) as r:
                  comment = json.load(r)["choices"][0]["message"]["content"]
          except urllib.error.HTTPError as e:
              comment = f"## ✅ Revisão de Qualidade\n\n_Erro HTTP {e.code}: {e.read().decode()[:300]}_"

          with open("qa_comment.txt", "w") as f:
              f.write(comment)
          print(comment)
          PYEOF

      - name: 💬 Postar comentário de QA
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh pr comment "${{ github.event.pull_request.number }}" --body-file qa_comment.txt

  # ── Revisão de Arquitetura ────────────────────────────────────────────────
  architect-review:
    name: Architecture Review
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: |
      github.actor != 'dependabot[bot]' &&
      github.actor != 'copilot-swe-agent[bot]'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🏗️ Revisão de Arquitetura com GitHub Models API
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          DIFF=$(gh pr diff "$PR_NUMBER" | head -c 4000 || echo "Sem diff disponível")

          python3 << 'PYEOF'
          import json, urllib.request, urllib.error, os, sys

          token  = os.environ["GH_TOKEN"]
          number = os.environ["PR_NUMBER"]
          title  = os.environ.get("PR_TITLE", "")
          diff   = os.environ.get("DIFF", "")

          system_prompt = """Você é um arquiteto de software especialista em Clean Architecture, SOLID e DDD.
          Analise o diff do PR e avalie aderência a boas práticas arquiteturais.
          Responda SOMENTE com o bloco markdown abaixo preenchido.

          ## 🏗️ Revisão de Arquitetura

          **Veredicto:** PASS | WARN | CRITICAL_FAIL

          ### Pontos positivos
          <o que está bem feito ou "N/A">

          ### Problemas arquiteturais
          <violações de Clean Arch, SOLID, acoplamento indevido, etc. ou "Nenhum encontrado">

          ### Recomendações
          <ações corretivas ou "Arquitetura está adequada">
          """

          user_prompt = f"Título do PR: {title}\n\nDiff (primeiros 4000 chars):\n{diff}"

          payload = {
              "model": "gpt-4o-mini",
              "messages": [
                  {"role": "system", "content": system_prompt},
                  {"role": "user",   "content": user_prompt}
              ],
              "max_tokens": 700,
              "temperature": 0.1
          }

          req = urllib.request.Request(
              "https://models.inference.ai.azure.com/chat/completions",
              data=json.dumps(payload).encode(),
              headers={"Authorization": f"Bearer {token}", "Content-Type": "application/json"}
          )

          try:
              with urllib.request.urlopen(req, timeout=30) as r:
                  comment = json.load(r)["choices"][0]["message"]["content"]
          except urllib.error.HTTPError as e:
              comment = f"## 🏗️ Revisão de Arquitetura\n\n_Erro HTTP {e.code}: {e.read().decode()[:300]}_"

          with open("architect_comment.txt", "w") as f:
              f.write(comment)
          print(comment)
          PYEOF

      - name: 💬 Postar comentário de arquitetura
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh pr comment "${{ github.event.pull_request.number }}" --body-file architect_comment.txt

  # ── Resultado Final ───────────────────────────────────────────────────────
  aggregate:
    name: Aggregate Results
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: [executar-testes, security-review, qa-review, architect-review]
    if: always()
    steps:
      - uses: actions/checkout@v4

      - name: 📊 Consolidar resultados
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          SECURITY_RESULT: ${{ needs.security-review.result }}
          QA_RESULT: ${{ needs.qa-review.result }}
          ARCHITECT_RESULT: ${{ needs.architect-review.result }}
          TESTS_RESULT: ${{ needs.executar-testes.result }}
        run: |
          python3 << 'PYEOF'
          import os

          def emoji(r): return "✅" if r == "success" else ("⏭️" if r == "skipped" else "❌")

          sec   = os.environ.get("SECURITY_RESULT",  "unknown")
          qa    = os.environ.get("QA_RESULT",         "unknown")
          arc   = os.environ.get("ARCHITECT_RESULT",  "unknown")
          tests = os.environ.get("TESTS_RESULT",      "unknown")

          # Testes são obrigatórios. Reviews AI são opcionais (podem ser skipped para bots)
          tests_ok   = tests == "success"
          reviews_ok = all(r in ("success", "skipped") for r in [sec, qa, arc])
          all_pass   = tests_ok and reviews_ok
          decision   = "✅ APROVADO PARA MERGE" if all_pass else "⚠️ REVISAR ANTES DO MERGE"

          comment = f"""## 📊 Resultado Final da Revisão

          | Revisão | Status |
          |---------|--------|
          | 🧪 Testes | {emoji(tests)} {tests} |
          | 🔒 Segurança | {emoji(sec)} {sec} |
          | ✅ Qualidade | {emoji(qa)} {qa} |
          | 🏗️ Arquitetura | {emoji(arc)} {arc} |

          **Decisão: {decision}**

          > Veja os comentários individuais acima para detalhes de cada revisão.
          """

          with open("aggregate_comment.txt", "w") as f:
              f.write(comment)
          print(comment)
          PYEOF

      - name: 💬 Postar resultado consolidado
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh pr comment "${{ github.event.pull_request.number }}" --body-file aggregate_comment.txt
