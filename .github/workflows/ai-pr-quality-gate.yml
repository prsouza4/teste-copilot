name: AI PR Quality Gate

# Revisão automática de PRs usando GitHub Models API.
# Três revisões paralelas (Security, QA, Architect) + consolidação final.

on:
  pull_request:
    branches: [main, develop]
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write
  models: read

concurrency:
  group: ai-quality-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  # ── Revisão de Segurança ──────────────────────────────────────────────────
  security-review:
    name: Security Review
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: |
      github.actor != 'dependabot[bot]'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🔒 Revisão de Segurança com GitHub Models API
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          DIFF=$(gh pr diff "$PR_NUMBER" | head -c 4000 || echo "Sem diff disponível")

          python3 << 'PYEOF'
          import json, urllib.request, urllib.error, os, sys

          token  = os.environ["GH_TOKEN"]
          number = os.environ["PR_NUMBER"]
          title  = os.environ.get("PR_TITLE", "")
          diff   = os.environ.get("DIFF", "")

          system_prompt = """Você é um especialista em segurança de software (AppSec).
          Analise o diff do PR e identifique vulnerabilidades de segurança.
          Responda SOMENTE com o bloco markdown abaixo preenchido.

          ## 🔒 Revisão de Segurança

          **Veredicto:** PASS | WARN | CRITICAL_FAIL

          ### Vulnerabilidades encontradas
          <lista com severidade: CRITICAL / HIGH / MEDIUM / LOW ou "Nenhuma encontrada">

          ### Recomendações
          <ações corretivas ou "Nenhuma ação necessária">
          """

          user_prompt = f"Título do PR: {title}\n\nDiff (primeiros 4000 chars):\n{diff}"

          payload = {
              "model": "gpt-4o-mini",
              "messages": [
                  {"role": "system", "content": system_prompt},
                  {"role": "user",   "content": user_prompt}
              ],
              "max_tokens": 700,
              "temperature": 0.1
          }

          req = urllib.request.Request(
              "https://models.inference.ai.azure.com/chat/completions",
              data=json.dumps(payload).encode(),
              headers={"Authorization": f"Bearer {token}", "Content-Type": "application/json"}
          )

          try:
              with urllib.request.urlopen(req, timeout=30) as r:
                  comment = json.load(r)["choices"][0]["message"]["content"]
          except urllib.error.HTTPError as e:
              comment = f"## 🔒 Revisão de Segurança\n\n_Erro HTTP {e.code}: {e.read().decode()[:300]}_"

          with open("security_comment.txt", "w") as f:
              f.write(comment)
          print(comment)
          PYEOF

      - name: 💬 Postar comentário de segurança
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh pr comment "${{ github.event.pull_request.number }}" --body-file security_comment.txt

  # ── Revisão de Qualidade ──────────────────────────────────────────────────
  qa-review:
    name: QA Review
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: |
      github.actor != 'dependabot[bot]'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: ✅ Revisão de Qualidade com GitHub Models API
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          DIFF=$(gh pr diff "$PR_NUMBER" | head -c 4000 || echo "Sem diff disponível")

          python3 << 'PYEOF'
          import json, urllib.request, urllib.error, os, sys

          token  = os.environ["GH_TOKEN"]
          number = os.environ["PR_NUMBER"]
          title  = os.environ.get("PR_TITLE", "")
          diff   = os.environ.get("DIFF", "")

          system_prompt = """Você é um especialista em qualidade de software e testes.
          Analise o diff do PR e avalie cobertura de testes e qualidade do código.
          Responda SOMENTE com o bloco markdown abaixo preenchido.

          ## ✅ Revisão de Qualidade

          **Veredicto:** PASS | WARN | CRITICAL_FAIL

          ### Cobertura de testes
          <avaliação: há testes para o código novo? Casos de borda cobertos?>

          ### Problemas de qualidade
          <lista ou "Nenhum encontrado">

          ### Recomendações
          <ações corretivas ou "Código está bem testado">
          """

          user_prompt = f"Título do PR: {title}\n\nDiff (primeiros 4000 chars):\n{diff}"

          payload = {
              "model": "gpt-4o-mini",
              "messages": [
                  {"role": "system", "content": system_prompt},
                  {"role": "user",   "content": user_prompt}
              ],
              "max_tokens": 700,
              "temperature": 0.1
          }

          req = urllib.request.Request(
              "https://models.inference.ai.azure.com/chat/completions",
              data=json.dumps(payload).encode(),
              headers={"Authorization": f"Bearer {token}", "Content-Type": "application/json"}
          )

          try:
              with urllib.request.urlopen(req, timeout=30) as r:
                  comment = json.load(r)["choices"][0]["message"]["content"]
          except urllib.error.HTTPError as e:
              comment = f"## ✅ Revisão de Qualidade\n\n_Erro HTTP {e.code}: {e.read().decode()[:300]}_"

          with open("qa_comment.txt", "w") as f:
              f.write(comment)
          print(comment)
          PYEOF

      - name: 💬 Postar comentário de QA
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh pr comment "${{ github.event.pull_request.number }}" --body-file qa_comment.txt

  # ── Revisão de Arquitetura ────────────────────────────────────────────────
  architect-review:
    name: Architecture Review
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: |
      github.actor != 'dependabot[bot]'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🏗️ Revisão de Arquitetura com GitHub Models API
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          DIFF=$(gh pr diff "$PR_NUMBER" | head -c 4000 || echo "Sem diff disponível")

          python3 << 'PYEOF'
          import json, urllib.request, urllib.error, os, sys

          token  = os.environ["GH_TOKEN"]
          number = os.environ["PR_NUMBER"]
          title  = os.environ.get("PR_TITLE", "")
          diff   = os.environ.get("DIFF", "")

          system_prompt = """Você é um arquiteto de software especialista em Clean Architecture, SOLID e DDD.
          Analise o diff do PR e avalie aderência a boas práticas arquiteturais.
          Responda SOMENTE com o bloco markdown abaixo preenchido.

          ## 🏗️ Revisão de Arquitetura

          **Veredicto:** PASS | WARN | CRITICAL_FAIL

          ### Pontos positivos
          <o que está bem feito ou "N/A">

          ### Problemas arquiteturais
          <violações de Clean Arch, SOLID, acoplamento indevido, etc. ou "Nenhum encontrado">

          ### Recomendações
          <ações corretivas ou "Arquitetura está adequada">
          """

          user_prompt = f"Título do PR: {title}\n\nDiff (primeiros 4000 chars):\n{diff}"

          payload = {
              "model": "gpt-4o-mini",
              "messages": [
                  {"role": "system", "content": system_prompt},
                  {"role": "user",   "content": user_prompt}
              ],
              "max_tokens": 700,
              "temperature": 0.1
          }

          req = urllib.request.Request(
              "https://models.inference.ai.azure.com/chat/completions",
              data=json.dumps(payload).encode(),
              headers={"Authorization": f"Bearer {token}", "Content-Type": "application/json"}
          )

          try:
              with urllib.request.urlopen(req, timeout=30) as r:
                  comment = json.load(r)["choices"][0]["message"]["content"]
          except urllib.error.HTTPError as e:
              comment = f"## 🏗️ Revisão de Arquitetura\n\n_Erro HTTP {e.code}: {e.read().decode()[:300]}_"

          with open("architect_comment.txt", "w") as f:
              f.write(comment)
          print(comment)
          PYEOF

      - name: 💬 Postar comentário de arquitetura
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh pr comment "${{ github.event.pull_request.number }}" --body-file architect_comment.txt

  # ── Resultado Final ───────────────────────────────────────────────────────
  aggregate:
    name: Aggregate Results
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: [security-review, qa-review, architect-review]
    if: always()
    steps:
      - uses: actions/checkout@v4

      - name: 📊 Consolidar resultados
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          SECURITY_RESULT: ${{ needs.security-review.result }}
          QA_RESULT: ${{ needs.qa-review.result }}
          ARCHITECT_RESULT: ${{ needs.architect-review.result }}
        run: |
          python3 << 'PYEOF'
          import os

          def emoji(r): return "✅" if r == "success" else "❌"

          sec = os.environ.get("SECURITY_RESULT", "unknown")
          qa  = os.environ.get("QA_RESULT",       "unknown")
          arc = os.environ.get("ARCHITECT_RESULT", "unknown")

          all_pass = all(r == "success" for r in [sec, qa, arc])
          decision = "✅ APROVADO PARA MERGE" if all_pass else "⚠️ REVISAR COMENTÁRIOS ACIMA"

          comment = f"""## 📊 Resultado Final da Revisão

          | Revisão | Status |
          |---------|--------|
          | 🔒 Segurança | {emoji(sec)} {sec} |
          | ✅ Qualidade | {emoji(qa)} {qa} |
          | 🏗️ Arquitetura | {emoji(arc)} {arc} |

          **Decisão: {decision}**

          > Veja os comentários individuais acima para detalhes de cada revisão.
          """

          with open("aggregate_comment.txt", "w") as f:
              f.write(comment)
          print(comment)
          PYEOF

      - name: 💬 Postar resultado consolidado
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh pr comment "${{ github.event.pull_request.number }}" --body-file aggregate_comment.txt
